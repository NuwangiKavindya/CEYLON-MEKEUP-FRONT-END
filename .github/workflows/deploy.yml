name: Deploy Frontend

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ceylon-makeup-frontend:latest
          build-args: |
            REACT_APP_STRIPE_PUBLISHABLE_KEY=${{ secrets.REACT_APP_STRIPE_PUBLISHABLE_KEY }}
            REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}


      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /app
            cat << 'EOF' > docker-compose.yml
            services:
              npm-proxy-manager:
                image: 'jc21/nginx-proxy-manager:latest'
                restart: unless-stopped
                ports:
                  - '80:80'
                  - '81:81'
                  - '443:443'
                volumes:
                  - ./data:/data
                  - ./letsencrypt:/etc/letsencrypt

              backend:
                image: "${{ secrets.DOCKERHUB_USERNAME }}/ceylon-makeup-backend:latest"
                restart: unless-stopped
                ports:
                  - '5000:5000'

              frontend:
                image: "${{ secrets.DOCKERHUB_USERNAME }}/ceylon-makeup-frontend:latest"
                restart: unless-stopped
                ports:
                  - '3000:3000'
            EOF
            
            docker-compose pull frontend
            docker-compose up -d --no-deps frontend


